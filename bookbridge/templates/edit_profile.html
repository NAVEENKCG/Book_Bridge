{% extends "base.html" %}
{% block title %}Edit Profile — BookBridge{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="mb-7">
    <h1 class="font-display font-bold text-2xl text-white">Edit Profile</h1>
    <p class="text-sm mt-1" style="color:#5a5a80;">Update your public information.</p>
  </div>

  {% if error %}
  <div class="mb-5 px-4 py-3 rounded-xl text-sm flex items-center gap-2" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;">
    {{ error }}
  </div>
  {% endif %}

  <div class="bb-card p-8">
    <form method="post" action="/profile/edit" class="space-y-5">

      <div>
        <label class="block text-sm font-medium mb-2" style="color:#9898b8;" for="name">Full Name</label>
        <input id="name" name="name" type="text" required value="{{ target.name }}" class="bb-input" />
      </div>

      <div>
        <label class="block text-sm font-medium mb-2" style="color:#9898b8;" for="college">College</label>
        <input id="college" name="college" type="text" value="{{ target.college or '' }}" placeholder="ABC Engineering" class="bb-input" />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium mb-2" style="color:#9898b8;" for="department">Department</label>
          <input id="department" name="department" type="text" value="{{ target.department or '' }}" placeholder="CSE" class="bb-input" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-2" style="color:#9898b8;" for="semester">Semester</label>
          <select id="semester" name="semester" class="bb-input">
            <option value="">--</option>
            {% for s in range(1, 9) %}
            <option value="{{ s }}" {% if target.semester == s %}selected{% endif %}>Semester {{ s }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="flex items-center gap-3 pt-2">
        <button type="submit" id="edit-profile-save" class="bb-btn-primary px-6">Save Changes</button>
        <a href="/profile/{{ target.id }}" class="bb-btn-ghost" id="edit-profile-cancel">Cancel</a>
      </div>
    </form>
  </div>

  <!-- Change password link -->
  <div class="mt-4 text-center">
    <a href="/change-password" class="text-sm transition-colors hover:text-purple-300" style="color:#44445a;" id="edit-change-pass-link">
      🔑 Change Password
    </a>
  </div>
</div>
{% endblock %}
