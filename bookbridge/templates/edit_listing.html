{% extends "base.html" %}
{% block title %}Edit Listing — BookBridge{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <div class="mb-7">
    <h1 class="font-display font-bold text-2xl text-white">Edit Listing</h1>
    <p class="text-sm mt-1" style="color:#5a5a80;">Update your details. Cover image and ISBN are preserved.</p>
  </div>

  <div class="bb-card p-8">
    <form method="post" action="/listing/{{ listing.id }}/edit" class="space-y-5">

      <!-- Title + Author -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-2" style="color:#9898b8;" for="title">Title <span style="color:#f87171;">*</span></label>
          <input id="title" name="title" type="text" required value="{{ listing.title }}" class="bb-input" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-2" style="color:#9898b8;" for="author">Author</label>
          <input id="author" name="author" type="text" value="{{ listing.author or '' }}" class="bb-input" />
        </div>
      </div>

      <!-- Condition + Price + Exchange -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium mb-2" style="color:#9898b8;" for="condition">Condition <span style="color:#f87171;">*</span></label>
          <select id="condition" name="condition" required class="bb-input">
            {% for c in conditions %}
            <option value="{{ c }}" {% if listing.condition == c %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2" style="color:#9898b8;" for="price">Price (₹)</label>
          <input id="price" name="price" type="number" min="0" value="{{ listing.price or '' }}" placeholder="Negotiate" class="bb-input" />
        </div>
        <div class="flex flex-col justify-end pb-1">
          <label class="flex items-center gap-2.5 cursor-pointer select-none">
            <div class="relative">
              <input type="checkbox" name="is_exchange" id="is_exchange" value="on" class="sr-only peer" {% if listing.is_exchange %}checked{% endif %} />
              <div class="w-10 h-5 rounded-full transition-colors" id="exchange-toggle-bg" style="background:{% if listing.is_exchange %}#6c47ff{% else %}#2a2a38{% endif %};"></div>
              <div class="absolute left-0.5 top-0.5 w-4 h-4 rounded-full bg-white transition-transform {% if listing.is_exchange %}translate-x-5{% endif %}" id="exchange-toggle-knob"></div>
            </div>
            <span class="text-sm font-medium" style="color:#9898b8;">Open to Exchange</span>
          </label>
        </div>
      </div>

      <!-- Course + Semester -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-2" style="color:#9898b8;" for="course_code">Course Code</label>
          <input id="course_code" name="course_code" type="text" value="{{ listing.course_code or '' }}" placeholder="CS301" class="bb-input" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-2" style="color:#9898b8;" for="semester">Semester</label>
          <select id="semester" name="semester" class="bb-input">
            <option value="">-- Any --</option>
            {% for s in range(1, 9) %}
            <option value="{{ s }}" {% if listing.semester == s %}selected{% endif %}>Semester {{ s }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- Description -->
      <div>
        <label class="block text-sm font-medium mb-2" style="color:#9898b8;" for="description">Notes / Description</label>
        <textarea id="description" name="description" rows="3" class="bb-input resize-none" style="height:auto;">{{ listing.description or '' }}</textarea>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3 pt-2">
        <button type="submit" id="edit-listing-save" class="bb-btn-primary px-6">Save Changes</button>
        <a href="/listing/{{ listing.id }}" class="bb-btn-ghost" id="edit-listing-cancel">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script>
  const cb = document.getElementById('is_exchange');
  const bg = document.getElementById('exchange-toggle-bg');
  const kn = document.getElementById('exchange-toggle-knob');
  cb.addEventListener('change', () => {
    bg.style.background = cb.checked ? '#6c47ff' : '#2a2a38';
    kn.style.transform  = cb.checked ? 'translateX(1.25rem)' : 'translateX(0)';
  });
</script>
{% endblock %}
