{% extends "base.html" %}
{% block title %}Change Password — BookBridge{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="mb-7">
    <h1 class="font-display font-bold text-2xl text-white">Change Password</h1>
    <p class="text-sm mt-1" style="color:#5a5a80;">Choose a strong password with at least 8 characters.</p>
  </div>

  {% if error %}
  <div class="mb-5 px-4 py-3 rounded-xl text-sm flex items-center gap-2" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;">
    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
    </svg>
    {{ error }}
  </div>
  {% endif %}

  <div class="bb-card p-8">
    <form method="post" action="/change-password" class="space-y-5">

      <div>
        <label class="block text-sm font-medium mb-2" style="color:#9898b8;" for="old_password">Current Password</label>
        <input id="old_password" name="old_password" type="password" required placeholder="Enter current password"
          class="bb-input" />
      </div>

      <div>
        <label class="block text-sm font-medium mb-2" style="color:#9898b8;" for="new_password">New Password</label>
        <input id="new_password" name="new_password" type="password" required placeholder="Min 8 characters"
          class="bb-input" />
      </div>

      <div>
        <label class="block text-sm font-medium mb-2" style="color:#9898b8;" for="confirm_password">Confirm New Password</label>
        <input id="confirm_password" name="confirm_password" type="password" required placeholder="Repeat new password"
          class="bb-input" />
      </div>

      <div class="flex items-center gap-3 pt-2">
        <button type="submit" id="change-pass-save" class="bb-btn-primary px-6">Update Password</button>
        <a href="/profile" class="bb-btn-ghost" id="change-pass-cancel">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
